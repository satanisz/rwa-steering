name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Type check
        run: uv run mypy

      - name: Security
        run: |
          uv run bandit -q -c pyproject.toml -r src
          uv run pip-audit

      - name: Generated input package is reproducible
        run: |
          uv run rwa-generate-missing-inputs
          git diff --exit-code -- src/rwa_steering/generated_inputs

      - name: Build package
        run: uv build

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
